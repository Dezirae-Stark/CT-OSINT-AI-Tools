name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to upload release assets

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Build React frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build with PyInstaller
        env:
          PYTHONPATH: ${{ github.workspace }}\backend;${{ github.workspace }}
        run: |
          pyinstaller ghostexodus.spec --clean --noconfirm

      - name: Verify exe was created
        run: |
          if (-not (Test-Path "dist\GhostExodus\GhostExodus.exe")) {
            Write-Error "GhostExodus.exe not found in dist\GhostExodus\"
            exit 1
          }
          $size = (Get-Item "dist\GhostExodus\GhostExodus.exe").Length
          Write-Host "GhostExodus.exe created — $([math]::Round($size / 1MB, 1)) MB"

      - name: Copy additional files into dist
        run: |
          Copy-Item ".env.example"               "dist\GhostExodus\.env.example"
          Copy-Item "README.md"                  "dist\GhostExodus\README.md"
          Copy-Item "ghostexodus.Modelfile"      "dist\GhostExodus\ghostexodus.Modelfile"
          Copy-Item "installer\setup_models.bat" "dist\GhostExodus\setup_models.bat"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Inno Setup installer
        run: |
          New-Item -ItemType Directory -Force -Path "installer\output" | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\ghostexodus.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup compilation failed"
            exit 1
          }

      - name: List installer output
        run: Get-ChildItem "installer\output\"

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostExodus-Installer-${{ github.ref_name }}
          path: installer\output\GhostExodus_Setup_v*.exe
          retention-days: 30

      - name: Attach installer to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\output\GhostExodus_Setup_v*.exe
